<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI Scanner</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --primary: #ff4d00; --bg: #050505; }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow: hidden;
        }

        .header { margin-bottom: 20px; text-align: center; }
        .header h1 { color: var(--primary); letter-spacing: 5px; margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px rgba(255,77,0,0.5); }
        .header p { margin: 5px 0 0; font-size: 0.8rem; color: #666; }

        .viewfinder { 
            position: relative; 
            width: 90vw; 
            max-width: 640px; 
            height: 60vh;
            max-height: 480px;
            background: #111; 
            border: 2px solid #333; 
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* WICHTIG: Keine scaleX(-1) Spiegelung mehr für lesbaren Text */
        video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
        }

        /* WICHTIG: Auch hier keine scaleX(-1) Spiegelung mehr */
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
        }

        .terminal { 
            margin-top: 20px; 
            width: 90vw; 
            max-width: 640px; 
            padding: 15px; 
            background: #0a0a0a; 
            border-left: 3px solid var(--primary); 
            font-size: 0.85rem;
            min-height: 80px;
        }

        .label { color: var(--primary); font-weight: bold; }

        #start-btn {
            position: absolute;
            z-index: 10;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(255,77,0,0.2), 0 0 10px rgba(255,77,0,0.2);
            transition: 0.3s;
        }

        #start-btn:active {
            background: var(--primary);
            color: black;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>DARKFOX AI</h1>
        <p>BIOMETRIC SCAN UNIT</p>
    </div>
    
    <div class="viewfinder" id="wrapper">
        <button id="start-btn">INITIALIZE SCANNER</button>
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
    </div>

    <div class="terminal">
        <div id="data-display">> SYSTEM WAITING FOR USER INITIALIZATION...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const dataDisplay = document.getElementById('data-display');

        // Dynamischer Pfad zu deinen Modellen
        const repoName = window.location.pathname.split('/')[1];
        const MODEL_URL = window.location.hostname.includes('github.io') 
            ? `/${repoName}/weights/` 
            : './weights/';

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            dataDisplay.innerHTML = "> ACCESSING NEURAL WEIGHTS... PLEASE WAIT.";

            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                
                dataDisplay.innerHTML = "> SYSTEM ONLINE. REQUESTING CAMERA OVERRIDE...";

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                
                await video.play();
                dataDisplay.innerHTML = "> CAMERA FEED ACTIVE. CALIBRATING...";

            } catch (err) {
                startBtn.style.display = 'block';
                startBtn.innerText = "ERROR - RETRY";
                dataDisplay.innerHTML = `<span style="color:red">> ERROR: ${err.message}</span>`;
                console.error(err);
            }
        });

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            // Alle 150ms das Gesicht scannen
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resized = faceapi.resizeResults(detections, displaySize);
                
                // Canvas leeren
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // WICHTIG: Die Standard-Draw-Funktionen nutzen jetzt ungespiegelte Koordinaten
                faceapi.draw.drawDetections(canvas, resized);
                faceapi.draw.drawFaceExpressions(canvas, resized);

                // Terminal Text aktualisieren
                if (resized.length > 0) {
                    const { age, gender, expressions } = resized[0];
                    const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    dataDisplay.innerHTML = `<span class="label">> TARGET LOCKED:</span> GENDER: ${gender.toUpperCase()} | AGE: ~${Math.round(age)} | STATUS: ${emotion.toUpperCase()}`;
                } else {
                    dataDisplay.innerHTML = `<span class="label">> SCANNING:</span> NO TARGET DETECTED...`;
                }
            }, 150);
        });
    </script>
</body>
</html>
