<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Scanner</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            color: #00ff95; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px; }
        #status { margin-bottom: 20px; color: #888; font-size: 0.8rem; }
        
        .scanner-container { 
            position: relative; 
            border: 2px solid #333; 
            border-radius: 12px; 
            box-shadow: 0 0 40px rgba(0, 255, 149, 0.15);
            line-height: 0; 
        }
        canvas { position: absolute; top: 0; left: 0; }
        video { border-radius: 10px; background: #000; }

        .data-display {
            margin-top: 25px;
            padding: 15px 40px;
            background: rgba(0, 255, 149, 0.05);
            border: 1px solid #00ff95;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>Biometric AI</h1>
    <div id="status">LOADING NEURAL NETWORKS...</div>

    <div class="scanner-container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div class="data-display">
        SCAN: <span id="details">Detecting...</span>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const details = document.getElementById('details');

        // Nutze externe Modelle, damit kein 404 Fehler kommt
        const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';

        async function init() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                startCamera();
            } catch (e) {
                status.innerText = "MODEL LOADING FAILED!";
                console.error(e);
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    status.innerText = "SYSTEM ACTIVE";
                    status.style.color = "#00ff95";
                })
                .catch(err => {
                    status.innerText = "CAMERA ACCESS DENIED";
                });
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.scanner-container').append(canvas);
            
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceExpressions(canvas, resizedDetections);

                if (resizedDetections.length > 0) {
                    resizedDetections.forEach(result => {
                        const { age, gender, expressions } = result;
                        const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                        
                        // Text in der Box unter dem Video
                        details.innerText = `${Math.round(age)}Y | ${gender.toUpperCase()} | ${emotion.toUpperCase()}`;

                        // Text direkt am Gesicht
                        new faceapi.draw.DrawTextField(
                            [`${Math.round(age)} years`, gender],
                            result.detection.box.bottomLeft
                        ).draw(canvas);
                    });
                }
            }, 100);
        });

        init();
    </script>
</body>
</html>
