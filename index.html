<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkFox AI - Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        :root { --primary: #ff4d00; --bg: #0a0b10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .viewfinder { position: relative; border: 2px solid #30363d; background: #000; line-height: 0; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; }
        video { position: relative; z-index: 5; }
        .terminal { margin-top: 20px; width: 600px; padding: 15px; background: #161b22; border-left: 3px solid var(--primary); font-size: 0.8rem; }
        .label { color: var(--primary); }
    </style>
</head>
<body>

    <h1 style="color:var(--primary); letter-spacing: 5px;">DARKFOX AI</h1>
    
    <div class="viewfinder" id="wrapper">
        <video id="video" width="640" height="480" autoplay muted playsinline></video>
    </div>

    <div class="terminal">
        <span class="label">> SYSTEM:</span> <span id="status">CONNECTING...</span><br>
        <div id="data-display">INITIALIZING...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const dataDisplay = document.getElementById('data-display');

        // Wir versuchen es mit einer URL, die direkt von GitHub kommt
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/weights/';

        async function start() {
            try {
                status.innerText = "LOADING MODELS...";
                
                // Wir laden nur die wichtigsten 3 Modelle für bessere Stabilität
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                
                status.innerText = "MODELS READY";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640 } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "FATAL ERROR";
                dataDisplay.innerText = "Details: " + err.message;
                console.error(err);
            }
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resized = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                faceapi.draw.drawDetections(canvas, resized);

                if (resized.length > 0) {
                    const { age, gender, expressions } = resized[0];
                    const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    dataDisplay.innerHTML = `> SCAN: ${gender.toUpperCase()} | ${Math.round(age)} YRS | MOOD: ${emotion.toUpperCase()}`;
                }
            }, 200);
        });

        start();
    </script>
</body>
</html>
