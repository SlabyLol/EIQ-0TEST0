<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v2.0</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --primary: #ff4d00; --bg: #050505; --text: #00ff00; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; overflow: hidden;
        }
        
        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { color: var(--primary); letter-spacing: 4px; font-size: 1.2rem; margin: 0; }

        .viewfinder { 
            position: relative; width: 90vw; max-width: 640px; aspect-ratio: 4/3;
            background: #111; border: 1px solid #333; overflow: hidden;
        }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        /* LOADING BAR STYLE */
        .loading-container {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .progress-box { width: 70%; height: 20px; border: 1px solid var(--primary); padding: 2px; margin-top: 10px; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        /* DEBUG PROTOKOLL STYLE */
        .terminal { 
            margin-top: 10px; width: 90vw; max-width: 640px; 
            height: 120px; background: #0a0a0a; 
            border-left: 3px solid var(--primary); padding: 10px;
            font-size: 0.7rem; color: var(--text); overflow-y: auto;
            border-bottom: 1px solid #222;
        }
        .log-entry { margin-bottom: 3px; border-bottom: 1px solid #111; }
        .log-time { color: #555; margin-right: 10px; }

        #start-btn {
            background: var(--primary); color: black; border: none;
            padding: 15px 30px; font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>DARKFOX AI SYSTEM</h1>
    </div>
    
    <div class="viewfinder" id="wrapper">
        <div id="loading-screen" class="loading-container" style="display: none;">
            <div style="color: var(--primary); font-size: 0.8rem;">LOADING NEURAL WEIGHTS...</div>
            <div class="progress-box"><div id="progress-fill"></div></div>
            <div id="loading-percent" style="font-size: 0.7rem; margin-top: 5px;">0%</div>
        </div>
        
        <button id="start-btn" onclick="initApp()">INITIALIZE SCANNER</button>
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="terminal" id="debug-log">
        <div class="log-entry">> SYSTEM STANDBY. AWAITING USER COMMAND...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const debugLog = document.getElementById('debug-log');
        const startBtn = document.getElementById('start-btn');
        const loadingScreen = document.getElementById('loading-screen');
        const progressFill = document.getElementById('progress-fill');
        const loadingPercent = document.getElementById('loading-percent');

        const repoName = window.location.pathname.split('/')[1];
        const MODEL_URL = window.location.hostname.includes('github.io') ? `/${repoName}/weights/` : './weights/';

        function log(msg) {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> > ${msg}`;
            debugLog.prepend(entry);
        }

        async function initApp() {
            startBtn.style.display = 'none';
            loadingScreen.style.display = 'flex';
            log("USER_INIT: Starting sequence...");

            try {
                // Kamera Vorbereitung
                log("CAMERA: Requesting user media...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                log("CAMERA: Stream established.");

                // Modelle laden mit Progress-Sim
                const models = [
                    { name: "TinyFaceDetector", net: faceapi.nets.tinyFaceDetector },
                    { name: "FaceExpressions", net: faceapi.nets.faceExpressionNet },
                    { name: "AgeGenderNet", net: faceapi.nets.ageGenderNet }
                ];

                for (let i = 0; i < models.length; i++) {
                    const perc = Math.round(((i + 1) / models.length) * 100);
                    log(`CORE: Loading ${models[i].name}...`);
                    await models[i].net.loadFromUri(MODEL_URL);
                    progressFill.style.width = perc + "%";
                    loadingPercent.innerText = perc + "%";
                }

                log("CORE: All models active. Ready.");
                loadingScreen.style.display = 'none';
                startAnalysis();

            } catch (err) {
                log("FATAL ERROR: " + err.message);
                loadingScreen.innerHTML = `<div style="color:red">ERROR: ${err.message}</div>`;
            }
        }

        async function startAnalysis() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            log("ANALYSIS: Neural Engine started (Input: 128px)");

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }))
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resized.length > 0) {
                    resized.forEach(result => {
                        const { detection, age, gender, expressions } = result;
                        const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                        
                        ctx.strokeStyle = '#ff4d00';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(detection.box.x, detection.box.y, detection.box.width, detection.box.height);

                        log(`TARGET: ${gender.toUpperCase()} | ${Math.round(age)}Y | ${emotion.toUpperCase()}`);
                    });
                }
            }, 200);
        }
    </script>
</body>
</html>
