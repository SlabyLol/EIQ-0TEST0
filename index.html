<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v4.5</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; --text: #e2f8ff; --warning: #ff4d00; --log-btn: #ffcc00; --mesh-btn: #00ff66; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }

        /* VIEWPORT */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.2);
        }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; transform: scaleX(-1); }

        /* BADGES */
        .badge {
            position: absolute; z-index: 20; background: rgba(0,0,0,0.85); 
            padding: 6px 14px; border-radius: 4px; font-size: 11px; 
            border: 1px solid var(--accent); color: var(--accent); font-weight: 900;
        }
        #mode-display { top: 12px; left: 12px; }
        #target-count { top: 12px; right: 12px; color: var(--warning); border-color: var(--warning); }

        /* BOOT SCREEN */
        #boot-screen {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .boot-logo { width: 130px; height: 130px; border-radius: 50%; box-shadow: 0 0 30px var(--accent); margin-bottom: 25px; }
        
        .btn-init {
            padding: 12px 24px; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px; transition: 0.3s;
        }
        .btn-init:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* FLOATING CONTROLS (UNRECHTS) */
        .controls-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 200;
            display: flex; flex-direction: column; gap: 10px;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 5px; 
            font-size: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        #log-trigger { color: var(--log-btn); border: 1px solid var(--log-btn); }
        #log-trigger:hover { background: var(--log-btn); color: #000; }
        
        #mesh-trigger { color: var(--mesh-btn); border: 1px solid var(--mesh-btn); }
        #mesh-trigger.active { background: var(--mesh-btn); color: #000; box-shadow: 0 0 15px var(--mesh-btn); }

        /* MODAL LOG */
        #log-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 300; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--panel); border: 1px solid var(--log-btn); width: 100%; max-width: 500px;
            padding: 20px; border-radius: 10px; position: relative;
        }
        #log-text { font-size: 11px; color: #8899aa; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 10px; color: #666; cursor: pointer; font-size: 20px; }

        /* DATA CARDS */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .label-tag { font-size: 9px; color: var(--accent); font-weight: bold; }
        .label-val { font-size: 16px; font-weight: 900; display: block; margin-top: 4px; }

        .console { 
            background: #010409; border-radius: 8px; padding: 10px; height: 90px; 
            overflow-y: auto; font-size: 10px; color: #445566; border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button id="mesh-trigger" class="ctrl-btn" onclick="toggleMesh()">3D Mesh OFF</button>
        <button id="log-trigger" class="ctrl-btn" onclick="openLog()">Update-Log.txt</button>
    </div>

    <div id="log-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeLog()">&times;</span>
            <div style="color:var(--log-btn); margin-bottom:10px; font-weight:bold;">REPOSITORY LOG: update-log.txt</div>
            <div id="log-text">Lade...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="viewport" id="wrapper">
            <div class="badge" id="mode-display">DARKFOX OS v4.5</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="boot-screen">
                <img src="IMG_0643.jpeg" class="boot-logo">
                <button class="btn-init" id="start-btn" onclick="initializeSystem()">Initialize System</button>
            </div>
            
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div class="data-grid">
            <div class="data-card"><span class="label-tag">PRIMARY SEX</span><span id="val-g" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">EST. AGE</span><span id="val-a" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">EMOTION</span><span id="val-e" class="label-val">--</span></div>
        </div>

        <div class="console" id="log-console">> SYSTEM STANDBY. READY FOR BOOT.</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const terminal = document.getElementById('log-console');
        let canvas, ctx, showMesh = false;

        function log(m) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${m}`;
            terminal.prepend(div);
        }

        // 3D Mesh Toggle
        function toggleMesh() {
            showMesh = !showMesh;
            const btn = document.getElementById('mesh-trigger');
            btn.classList.toggle('active');
            btn.innerText = showMesh ? "3D Mesh ON" : "3D Mesh OFF";
            log(`SYSTEM: 3D Mesh Engine ${showMesh ? 'aktiviert' : 'deaktiviert'}.`);
        }

        // Log-Datei Funktionen
        async function openLog() {
            document.getElementById('log-modal').style.display = 'flex';
            try {
                const response = await fetch('update-log.txt');
                const text = response.ok ? await response.text() : "update-log.txt nicht gefunden.";
                document.getElementById('log-text').innerText = text;
            } catch (e) { document.getElementById('log-text').innerText = "Fehler beim Laden."; }
        }
        function closeLog() { document.getElementById('log-modal').style.display = 'none'; }

        async function initializeSystem() {
            document.getElementById('start-btn').innerText = "BOOTING...";
            log("BOOT: Lade KI-Module...");

            const MODEL_URL = './weights/';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    document.getElementById('boot-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('boot-screen').remove(), 1000);
                    startNeuralLoop();
                };
            } catch(e) { log("BOOT ERROR: " + e.message); }
        }

        async function startNeuralLoop() {
            canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            ctx = canvas.getContext('2d');

            const loop = async () => {
                const dims = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, dims);

                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
                    .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

                const resized = faceapi.resizeResults(results, dims);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('target-count').innerText = `TARGETS: ${resized.length}`;

                if(resized.length > 0) {
                    const p = resized[0];
                    document.getElementById('val-g').innerText = p.gender.toUpperCase();
                    document.getElementById('val-a').innerText = Math.round(p.age) + " JRS";
                    document.getElementById('val-e').innerText = Object.keys(p.expressions).reduce((a,b)=>p.expressions[a]>p.expressions[b]?a:b).toUpperCase();

                    resized.forEach((res, index) => {
                        ctx.strokeStyle = '#5efcff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(res.detection.box.x, res.detection.box.y, res.detection.box.width, res.detection.box.height);
                        
                        if(showMesh) faceapi.draw.drawFaceLandmarks(canvas, res);
                        
                        ctx.save();
                        ctx.scale(-1, 1);
                        ctx.fillStyle = '#5efcff';
                        ctx.fillText(`ID#00${index+1}`, -(res.detection.box.x + 5), res.detection.box.y - 7);
                        ctx.restore();
                    });
                }
                requestAnimationFrame(loop);
            };
            loop();
        }
    </script>
</body>
</html>
