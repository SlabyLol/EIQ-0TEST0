<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Deep Scan Fix</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; --text: #e2f8ff; --warning: #ff4d00; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; }
        .viewport { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .badge { position: absolute; z-index: 20; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 10px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
        #mode-display { top: 10px; left: 10px; }
        #target-count { top: 10px; right: 10px; color: var(--warning); border-color: var(--warning); }
        #overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .boot-logo { width: 120px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 0 20px var(--accent); }
        .btn { padding: 10px 20px; background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); padding: 10px; text-align: center; border-radius: 8px; }
        .label-tag { font-size: 9px; color: var(--accent); display: block; }
        .label-val { font-size: 14px; font-weight: bold; font-family: monospace; }
        .console { background: #000; padding: 10px; height: 80px; font-size: 10px; color: #666; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport" id="wrapper">
            <div class="badge" id="mode-display">OFFLINE</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="overlay">
                <img src="IMG_0643.jpeg" class="boot-logo">
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="boot('camera')">Live</button>
                    <label class="btn" for="video-upload">Import</label>
                </div>
                <input type="file" id="video-upload" accept="video/*" onchange="boot('import')">
                <div id="status" style="margin-top:15px; font-size:10px; color:var(--accent);">AWAITING COMMAND...</div>
            </div>
            <video id="video" muted playsinline loop></video>
        </div>

        <div class="data-grid">
            <div class="data-card"><span class="label-tag">SEX</span><span id="val-g" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">AGE</span><span id="val-a" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">EMOTION</span><span id="val-e" class="label-val">--</span></div>
        </div>

        <div class="console" id="log">> SYSTEM IDLE...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const logBox = document.getElementById('log');
        let canvas, ctx;

        function log(m) { 
            const d = document.createElement('div'); 
            d.innerText = `[${new Date().toLocaleTimeString()}] > ${m}`;
            logBox.prepend(d);
        }

        async function boot(mode) {
            document.getElementById('status').innerText = "LOADING AI MODELS...";
            const MODEL_URL = './weights/'; 
            
            try {
                // Lade alle Modelle explizit
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                log("MODELS LOADED SUCCESSFULLY");

                if (mode === 'camera') {
                    video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('mode-display').innerText = "LIVE FEED";
                } else {
                    const file = document.getElementById('video-upload').files[0];
                    video.src = URL.createObjectURL(file);
                    document.getElementById('mode-display').innerText = "ANALYSIS";
                }

                video.onloadeddata = () => {
                    video.play();
                    document.getElementById('overlay').style.display = 'none';
                    startDetection();
                };
            } catch (e) { log("ERROR: " + e.message); }
        }

        function startDetection() {
            canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            ctx = canvas.getContext('2d');

            setInterval(async () => {
                if (video.paused || video.readyState < 2) return;

                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, displaySize);

                // Sensibilität auf 0.3 gesenkt für bessere Erkennung
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 }))
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resized = faceapi.resizeResults(detections, displaySize);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('target-count').innerText = `TARGETS: ${resized.length}`;

                if (resized.length > 0) {
                    const p = resized[0];
                    document.getElementById('val-g').innerText = p.gender.toUpperCase();
                    document.getElementById('val-a').innerText = Math.round(p.age);
                    document.getElementById('val-e').innerText = Object.keys(p.expressions).reduce((a,b)=>p.expressions[a]>p.expressions[b]?a:b).toUpperCase();

                    resized.forEach(res => {
                        // Box zeichnen
                        ctx.strokeStyle = '#5efcff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(res.detection.box.x, res.detection.box.y, res.detection.box.width, res.detection.box.height);
                        // Mesh zeichnen
                        faceapi.draw.drawFaceLandmarks(canvas, res);
                    });
                }
            }, 150);
        }
    </script>
</body>
</html>
