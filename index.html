<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Multi-Target Terminal</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; --text: #e2f8ff; --warning: #ff4d00; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh;
        }

        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; }

        /* VIEWPORT */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.15);
        }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        /* STATUS BADGES */
        .badge {
            position: absolute; z-index: 20; background: rgba(0,0,0,0.85); 
            padding: 6px 14px; border-radius: 4px; font-size: 11px; 
            border: 1px solid var(--accent); color: var(--accent); font-weight: 900;
        }
        #mode-display { top: 15px; left: 15px; }
        #target-count { top: 15px; right: 15px; color: var(--warning); border-color: var(--warning); }

        /* BOOT SCREEN */
        #overlay {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        .boot-logo { width: 150px; height: 150px; border-radius: 50%; box-shadow: 0 0 30px var(--accent); margin-bottom: 25px; }
        
        .btn {
            padding: 10px 18px; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 11px; transition: 0.2s;
        }
        .btn:hover { background: var(--accent); color: #000; }
        .active-fx { background: var(--accent) !important; color: #000 !important; }

        /* UI ELEMENTS */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .label-tag { font-size: 9px; color: var(--accent); font-weight: bold; opacity: 0.8; }
        .label-val { font-size: 14px; font-family: monospace; font-weight: 900; display: block; margin-top: 4px; }

        .controls-row { display: flex; gap: 8px; justify-content: center; }

        .console { 
            background: #010409; border-radius: 8px; padding: 10px; height: 115px; 
            overflow-y: auto; font-family: 'Consolas', monospace; font-size: 10px; 
            border: 1px solid var(--border); color: #888;
        }
        .log-load { color: var(--accent); }

        .copyright { font-size: 10px; color: #334155; text-align: center; margin-top: 5px; font-weight: bold; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport" id="wrapper">
            <div class="badge" id="mode-display">SYSTEM: IDLE</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="overlay">
                <img src="IMG_0643.jpeg" class="boot-logo">
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="bootSystem('camera')">Live Mode</button>
                    <label class="btn" for="video-upload">Import Video</label>
                </div>
                <input type="file" id="video-upload" accept="video/*" onchange="bootSystem('import')">
                
                <div id="loader" style="display:none; text-align:center; width:220px; margin-top:20px;">
                    <div id="status" style="font-size:10px; color:var(--accent);">SYNCING NEURAL ASSETS...</div>
                    <div style="width:100%; height:3px; background:#111; margin-top:8px;"><div id="bar" style="width:0%; height:100%; background:var(--accent);"></div></div>
                </div>
            </div>
            <video id="video" autoplay muted playsinline loop></video>
        </div>

        <div class="data-grid">
            <div class="data-card"><span class="label-tag">PRIMARY SEX</span><span id="val-g" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">PRIMARY AGE</span><span id="val-a" class="label-val">--</span></div>
            <div class="data-card"><span class="label-tag">PRIMARY MOOD</span><span id="val-e" class="label-val">--</span></div>
        </div>

        <div class="controls-row">
            <button class="btn" onclick="toggleMesh()" id="mesh-btn">3D Mesh</button>
            <button class="btn" onclick="setSpeed(0.5)">0.5x</button>
            <button class="btn" onclick="setSpeed(1.0)">1.0x</button>
            <button class="btn" onclick="setSpeed(2.0)">2.0x</button>
        </div>

        <div class="console" id="log">> STANDBY. SELECT MISSION SOURCE...</div>
        <div class="copyright">Copyright DarkFox Co. 2026</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const terminal = document.getElementById('log');
        let showMesh = false;
        let aiActive = false;

        const repoName = window.location.pathname.split('/')[1];
        const MODEL_URL = window.location.hostname.includes('github.io') ? `/${repoName}/weights/` : './weights/';

        function log(msg, asset = false) {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `[${time}] > ${asset ? '<span class="log-load">LOADED ASSET FROM: ' + msg + '</span>' : msg}`;
            terminal.prepend(div);
        }

        function setSpeed(s) { video.playbackRate = s; log(`SYSTEM: Playback set to ${s}x`); }
        function toggleMesh() { showMesh = !showMesh; document.getElementById('mesh-btn').classList.toggle('active-fx'); }

        async function bootSystem(mode) {
            document.getElementById('loader').style.display = 'block';
            
            try {
                const models = ['tiny_face_detector', 'face_landmark_68_net', 'face_expression_net', 'age_gender_net'];
                for (let i = 0; i < models.length; i++) {
                    const path = `${MODEL_URL}${models[i]}_model-weights_manifest.json`;
                    log(path, true);
                    await faceapi.nets[models[i].replace(/_([a-z0-9])/g, (g) => g[1].toUpperCase())].loadFromUri(MODEL_URL);
                    document.getElementById('bar').style.width = ((i+1)/models.length * 100) + "%";
                }

                if (mode === 'camera') {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    document.getElementById('mode-display').innerText = "SYSTEM: LIVE FEED";
                    log("LIVE: Multi-Target camera active.");
                } else {
                    const file = document.getElementById('video-upload').files[0];
                    video.src = URL.createObjectURL(file);
                    document.getElementById('mode-display').innerText = "SYSTEM: VIDEO ANALYSIS";
                    log(`IMPORT: Loaded ${file.name}. Running shards.`);
                }

                document.getElementById('overlay').style.display = 'none';
                if(!aiActive) runAI();
                aiActive = true;
            } catch (e) { log("FATAL: " + e.message); }
        }

        function runAI() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('wrapper').append(canvas);
            
            setInterval(async () => {
                if(video.paused || video.ended) return;

                const size = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, size);

                // Long-Range Multi-Detection
                const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.4 });
                const detections = await faceapi.detectAllFaces(video, options)
                    .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

                const resized = faceapi.resizeResults(detections, size);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Update Target Counter for BOTH modes
                document.getElementById('target-count').innerText = `TARGETS: ${resized.length}`;

                if (resized.length > 0) {
                    // Update Primary Target Data (the first person detected)
                    const primary = resized[0];
                    document.getElementById('val-g').innerText = primary.gender.toUpperCase();
                    document.getElementById('val-a').innerText = Math.round(primary.age) + " YRS";
                    document.getElementById('val-e').innerText = Object.keys(primary.expressions).reduce((a,b)=>primary.expressions[a]>primary.expressions[b]?a:b).toUpperCase();

                    // Draw Mesh and Boxes for ALL detected persons
                    resized.forEach(result => {
                        const { detection, landmarks } = result;
                        
                        // Tech-Box
                        ctx.strokeStyle = '#5efcff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(detection.box.x, detection.box.y, detection.box.width, detection.box.height);

                        // 3D Mesh (if enabled)
                        if(showMesh) {
                            ctx.fillStyle = '#5efcff';
                            ctx.strokeStyle = 'rgba(94, 252, 255, 0.4)';
                            ctx.lineWidth = 0.5;
                            faceapi.draw.drawFaceLandmarks(canvas, result);
                        }
                    });
                } else {
                    document.getElementById('val-g').innerText = "--";
                    document.getElementById('val-a').innerText = "--";
                    document.getElementById('val-e').innerText = "--";
                }
            }, 100);
        }
    </script>
</body>
</html>
