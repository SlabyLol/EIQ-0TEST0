<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v6.6</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { 
            --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; 
            --text: #e2f8ff; --warning: #ff4d00; --log-btn: #ffcc00; --mesh-btn: #00ff66; --bug-btn: #ff3300;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; 
        }
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        
        /* FIX: Robust Viewport with explicit Z-Indexing */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3; min-height: 320px;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.2);
        }
        
        video { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; z-index: 1; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; transform: scaleX(-1); pointer-events: none; }
        
        /* BOOT SCREEN ALWAYS ON TOP */
        #boot-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
        .boot-logo { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 30px var(--accent); margin-bottom: 30px; object-fit: cover; }
        
        .badge { position: absolute; z-index: 20; background: rgba(0,0,0,0.85); padding: 6px 14px; border-radius: 4px; font-size: 11px; border: 1px solid var(--accent); color: var(--accent); font-weight: 900; pointer-events: none; }
        #mode-display { top: 12px; left: 12px; }
        #target-count { top: 12px; right: 12px; color: var(--warning); border-color: var(--warning); }
        
        .btn-main { padding: 14px 28px; background: transparent; color: var(--accent); border: 2px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); }
        
        .controls-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .ctrl-btn { background: rgba(0,0,0,0.9); padding: 12px 18px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--border); min-width: 150px; text-align: left; }
        #btn-mesh { color: var(--mesh-btn); border-color: var(--mesh-btn); }
        #btn-mesh.active { background: var(--mesh-btn); color: #000; box-shadow: 0 0 20px var(--mesh-btn); }
        #btn-bug { color: var(--bug-btn); border-color: var(--bug-btn); }
        #btn-log { color: var(--log-btn); border-color: var(--log-btn); }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; }
        .tag { font-size: 10px; color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; }
        .val { font-size: 16px; font-weight: 900; color: #fff; }
        
        .terminal { background: #010409; border-radius: 8px; padding: 12px; height: 130px; overflow-y: auto; font-size: 11px; color: #556677; border: 1px solid var(--border); }
        .term-line { margin-bottom: 5px; line-height: 1.4; border-left: 2px solid transparent; padding-left: 8px; }
        .term-success { border-left-color: var(--mesh-btn); color: #aaffaa; }
    </style>
</head>
<body>

    <div class="controls-container">
        <button id="btn-bug" class="ctrl-btn" onclick="alert('Bug Report System: Active')">[!] Emergency Report</button>
        <button id="btn-mesh" class="ctrl-btn" onclick="toggleMesh()">3D Mesh: DISABLED</button>
        <button id="btn-log" class="ctrl-btn">Update-Log.txt</button>
    </div>

    <div class="main-container">
        <div class="viewport" id="cam-wrapper">
            <div class="badge" id="mode-display">SYSTEM: OFFLINE</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="boot-screen">
                <img src="IMG_0643.jpeg" class="boot-logo" onerror="this.src='https://via.placeholder.com/140?text=DarkFox+Logo'">
                <button class="btn-main" id="boot-btn" onclick="initEngine()">Initialize DarkFox AI</button>
            </div>
            
            <video id="video-feed" autoplay muted playsinline></video>
        </div>
        
        <div class="data-grid">
            <div class="data-card"><span class="tag">BIOMETRY</span><span id="out-gender" class="val">--</span></div>
            <div class="data-card"><span class="tag">AGE_EST</span><span id="out-age" class="val">--</span></div>
            <div class="data-card"><span class="tag">AFFECT</span><span id="out-emotion" class="val">--</span></div>
        </div>
        
        <div class="terminal" id="term-out">
            <div class="term-line">> DARKFOX AI KERNEL READY. AWAITING USER AUTH...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const term = document.getElementById('term-out');
        let canvas, ctx, meshActive = false;
        let nextId = 1;

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = `term-line ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function toggleMesh() {
            meshActive = !meshActive;
            const btn = document.getElementById('btn-mesh');
            btn.innerText = meshActive ? "3D Mesh: ACTIVE" : "3D Mesh: DISABLED";
            btn.classList.toggle('active');
            log(`MESH ENGINE ${meshActive ? 'STARTED' : 'STOPPED'}`, 'term-success');
        }

        async function initEngine() {
            document.getElementById('boot-btn').innerText = "CALIBRATING...";
            log("Loading Neural Weights...");
            const PATH = './weights/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(PATH),
                    faceapi.nets.faceLandmark68Net.loadFromUri(PATH),
                    faceapi.nets.faceExpressionNet.loadFromUri(PATH),
                    faceapi.nets.ageGenderNet.loadFromUri(PATH)
                ]);
                log("Neural Networks: ONLINE", "term-success");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (e) { log("CRITICAL ERROR: Weights or Camera missing."); }
        }

        video.addEventListener('play', () => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 500);
            document.getElementById('mode-display').innerText = "SYSTEM: LIVE";
            
            canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('cam-wrapper').append(canvas);
            ctx = canvas.getContext('2d');

            const process = async () => {
                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                if (canvas.width !== displaySize.width) faceapi.matchDimensions(canvas, displaySize);

                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
                    .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

                const scaledResults = faceapi.resizeResults(results, displaySize);
                
                // 1. HARD CLEAR EVERY FRAME
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                scaledResults.forEach(res => {
                    const box = res.detection.box;

                    // 2. ALWAYS DRAW TARGET BOX
                    ctx.strokeStyle = '#5efcff';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]); // Cyber-look dash
                    ctx.strokeRect(box.x, box.y, box.width, box.height);
                    ctx.setLineDash([]); // Reset

                    // 3. DRAW MESH (ONLY IF ACTIVE)
                    if (meshActive) {
                        ctx.fillStyle = '#00ff66';
                        ctx.strokeStyle = '#00ff66';
                        ctx.lineWidth = 1;
                        const landmarks = res.landmarks.positions;
                        
                        // Drawing points
                        landmarks.forEach(p => {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 1.5, 0, 2 * Math.PI);
                            ctx.fill();
                        });

                        // Drawing connector lines for "3D" feel
                        const drawPath = (from, to) => {
                            ctx.beginPath();
                            for(let i=from; i<to; i++) {
                                ctx.moveTo(landmarks[i].x, landmarks[i].y);
                                ctx.lineTo(landmarks[i+1].x, landmarks[i+1].y);
                            }
                            ctx.stroke();
                        };

                        drawPath(0, 16);  // Jaw
                        drawPath(17, 21); // Left eyebrow
                        drawPath(22, 26); // Right eyebrow
                        drawPath(27, 35); // Nose
                        drawPath(36, 41); // Left eye
                        ctx.lineTo(landmarks[36].x, landmarks[36].y); ctx.stroke(); // Close eye
                        drawPath(42, 47); // Right eye
                        ctx.lineTo(landmarks[42].x, landmarks[42].y); ctx.stroke(); // Close eye
                        drawPath(48, 59); // Outer Mouth
                        ctx.lineTo(landmarks[48].x, landmarks[48].y); ctx.stroke();
                    }

                    // 4. DRAW MIRRORED TAGS
                    ctx.save();
                    ctx.scale(-1, 1);
                    ctx.font = 'bold 14px monospace';
                    ctx.fillStyle = '#5efcff';
                    ctx.fillText(`TRK_ID_${nextId}`, -(box.x + box.width), box.y - 12);
                    ctx.restore();
                });

                document.getElementById('target-count').innerText = `TARGETS: ${results.length}`;
                if(results.length > 0) {
                    const top = scaledResults[0];
                    document.getElementById('out-gender').innerText = top.gender.toUpperCase();
                    document.getElementById('out-age').innerText = Math.round(top.age) + " YRS";
                    document.getElementById('out-emotion').innerText = Object.keys(top.expressions).reduce((a,b)=>top.expressions[a]>top.expressions[b]?a:b).toUpperCase();
                }

                requestAnimationFrame(process);
            };
            process();
        });
    </script>
</body>
</html>
