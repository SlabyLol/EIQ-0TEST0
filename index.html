<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const dataDisplay = document.getElementById('data-display');

    // Dynamischer Pfad für GitHub Pages
    const repoName = window.location.pathname.split('/')[1];
    const MODEL_URL = window.location.hostname.includes('github.io') 
        ? `/${repoName}/weights/` 
        : './weights/';

    async function start() {
        try {
            status.innerText = "LOADING MODELS...";
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            
            status.innerText = "SYSTEM ONLINE";
            status.style.color = "#00ff00";

            // Kamera-Stream anfordern
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            
            video.srcObject = stream;
            
            // WICHTIG: Sicherstellen, dass das Video wirklich startet
            video.onloadedmetadata = () => {
                video.play();
                dataDisplay.innerText = "CAMERA FEED ACTIVE - SCANNING...";
            };

        } catch (err) {
            status.innerText = "FATAL ERROR";
            dataDisplay.innerText = "Camera or Path Error: " + err.name;
            console.error(err);
        }
    }

    video.addEventListener('play', () => {
        // Overlay erstellen
        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById('wrapper').append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceExpressions()
                .withAgeAndGender();

            const resized = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            
            // Zeichne die Boxen
            faceapi.draw.drawDetections(canvas, resized);

            if (resized.length > 0) {
                const { age, gender, expressions } = resized[0];
                const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                dataDisplay.innerHTML = `<span style="color:#ff4d00">> TARGET:</span> ${gender.toUpperCase()} | ${Math.round(age)} YRS | ${emotion.toUpperCase()}`;
            }
        }, 200);
    });

    start();
</script>
