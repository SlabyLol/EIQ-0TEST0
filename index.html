<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DarkFox AI - Terminal v6.4</title>
    <script src="dist/face-api.min.js"></script>
    <style>
        :root { 
            --accent: #5efcff; --bg: #04080d; --panel: #0b141d; --border: #1a2f3f; 
            --text: #e2f8ff; --warning: #ff4d00; --log-btn: #ffcc00; --mesh-btn: #00ff66; --bug-btn: #ff3300;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; 
        }
        .main-container { width: 95vw; max-width: 720px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        
        /* THE ROCK-SOLID VIEWPORT */
        .viewport { 
            position: relative; width: 100%; aspect-ratio: 4/3; min-height: 300px;
            background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(94, 252, 255, 0.15);
        }
        
        /* CSS MIRRORING (100% stable overlay) */
        video { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; transform: scaleX(-1); pointer-events: none; }
        
        .badge { position: absolute; z-index: 20; background: rgba(0,0,0,0.85); padding: 6px 14px; border-radius: 4px; font-size: 11px; border: 1px solid var(--accent); color: var(--accent); font-weight: 900; }
        #mode-display { top: 12px; left: 12px; }
        #target-count { top: 12px; right: 12px; color: var(--warning); border-color: var(--warning); }
        
        /* BOOT SCREEN */
        #boot-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s; }
        .boot-logo { width: 130px; height: 130px; border-radius: 50%; box-shadow: 0 0 30px var(--accent); margin-bottom: 25px; object-fit: cover; }
        .btn-main { padding: 12px 24px; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; transition: 0.3s; }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        
        /* CONTROLS (Moved slightly inward so they are always visible) */
        .controls-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
        .ctrl-btn { background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; min-width: 140px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        #btn-bug { color: var(--bug-btn); border: 1px solid var(--bug-btn); }
        #btn-mesh { color: var(--mesh-btn); border: 1px solid var(--mesh-btn); }
        #btn-mesh.active { background: var(--mesh-btn); color: #000; box-shadow: 0 0 15px var(--mesh-btn); }
        #btn-log { color: var(--log-btn); border: 1px solid var(--log-btn); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--panel); border: 1px solid var(--border); width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; position: relative; }
        .bug-input { width: 100%; background: #010409; border: 1px solid var(--border); color: #fff; padding: 10px; margin-bottom: 10px; font-family: monospace; font-size: 12px; outline: none; }
        .close-x { position: absolute; top: 15px; right: 15px; color: #445566; cursor: pointer; font-size: 22px; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .data-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .tag { font-size: 9px; color: var(--accent); font-weight: bold; }
        .val { font-size: 15px; font-weight: 900; display: block; margin-top: 4px; }
        
        .terminal { background: #010409; border-radius: 8px; padding: 10px; height: 120px; overflow-y: auto; font-size: 10px; color: #445566; border: 1px solid var(--border); scroll-behavior: smooth; }
        .term-line { margin-bottom: 4px; }
        .term-time { color: var(--log-btn); margin-right: 5px; }
    </style>
</head>
<body>

    <div class="controls-container">
        <button id="btn-bug" class="ctrl-btn" onclick="toggleModal('modal-bug', true)">[!] Report Bug</button>
        <button id="btn-mesh" class="ctrl-btn" onclick="toggleMesh()">3D Mesh OFF</button>
        <button id="btn-log" class="ctrl-btn" onclick="loadLogFile()">Update-Log.txt</button>
    </div>

    <div id="modal-bug" class="modal">
        <div class="modal-content" style="border-color: var(--bug-btn);">
            <span class="close-x" onclick="toggleModal('modal-bug', false)">&times;</span>
            <div style="color:var(--bug-btn); font-weight:bold; margin-bottom:15px;">BUG REPORT CONSOLE</div>
            <form id="bug-form">
                <input type="hidden" name="access_key" value="c387b391-5ee4-4fa0-98d6-2617c48f38f5">
                <input type="text" name="name" class="bug-input" placeholder="Name" required>
                <input type="email" name="email" class="bug-input" placeholder="Email" required>
                <input type="text" name="subject" class="bug-input" placeholder="Subject" required>
                <textarea name="message" class="bug-input" style="height: 80px; resize: none;" placeholder="Details..." required></textarea>
                <button type="submit" class="btn-main" style="width: 100%; border-color: var(--bug-btn); color: var(--bug-btn);">Transmit to DarkFox</button>
            </form>
        </div>
    </div>

    <div id="modal-log" class="modal">
        <div class="modal-content" style="border-color: var(--log-btn);">
            <span class="close-x" onclick="toggleModal('modal-log', false)">&times;</span>
            <div id="log-body" style="font-size: 11px; white-space: pre-wrap; color: #8899aa; line-height: 1.5; max-height: 60vh; overflow-y: auto;">Fetching Log...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="viewport" id="cam-wrapper">
            <div class="badge" id="mode-display">ENGINE: STANDBY</div>
            <div class="badge" id="target-count">TARGETS: 0</div>
            
            <div id="boot-screen">
                <img src="IMG_0643.jpeg" class="boot-logo" alt="Logo">
                <button class="btn-main" id="boot-btn" onclick="startEngine()">Initialize System</button>
            </div>
            
            <video id="video-feed" autoplay muted playsinline></video>
        </div>
        
        <div class="data-grid">
            <div class="data-card"><span class="tag">GENDER</span><span id="out-gender" class="val">--</span></div>
            <div class="data-card"><span class="tag">EST. AGE</span><span id="out-age" class="val">--</span></div>
            <div class="data-card"><span class="tag">EMOTION</span><span id="out-emotion" class="val">--</span></div>
        </div>
        
        <div class="terminal" id="term-out">
            <div class="term-line"><span class="term-time">[SYSTEM]</span> > AWAITING INITIALIZATION...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const term = document.getElementById('term-out');
        let canvas, ctx, meshEnabled = false;
        let nextFaceId = 1, trackedFaces = [], lastSeenTime = Date.now();

        function printTerm(msg) {
            const div = document.createElement('div');
            div.className = 'term-line';
            div.innerHTML = `<span class="term-time">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        async function loadLogFile() {
            toggleModal('modal-log', true);
            try {
                const res = await fetch('update-log.txt');
                document.getElementById('log-body').innerText = res.ok ? await res.text() : "Log file not found.";
            } catch (e) { document.getElementById('log-body').innerText = "Fetch error."; }
        }

        function toggleMesh() {
            meshEnabled = !meshEnabled;
            const b = document.getElementById('btn-mesh');
            b.innerText = meshEnabled ? "3D Mesh ON" : "3D Mesh OFF";
            b.classList.toggle('active');
            printTerm(`ENGINE: 3D Mesh Override -> ${meshEnabled ? 'ACTIVE' : 'INACTIVE'}`);
        }

        document.getElementById('bug-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "SENDING..."; btn.disabled = true;
            try {
                const res = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
                });
                if (res.ok) { 
                    printTerm("SUCCESS: Report delivered to HQ."); 
                    e.target.reset(); 
                    setTimeout(() => toggleModal('modal-bug', false), 1500); 
                }
                btn.innerText = "Transmit to DarkFox"; btn.disabled = false;
            } catch (err) { printTerm("FATAL: Send failed."); btn.disabled = false; }
        });

        async function startEngine() {
            document.getElementById('boot-btn').innerText = "LOADING AI...";
            printTerm("CORE: Accessing neural weights...");
            const PATH = './weights/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(PATH),
                    faceapi.nets.faceLandmark68Net.loadFromUri(PATH),
                    faceapi.nets.faceExpressionNet.loadFromUri(PATH),
                    faceapi.nets.ageGenderNet.loadFromUri(PATH)
                ]);
                printTerm("CORE: Weights loaded. Establishing camera link...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) { 
                printTerm("ERROR: Could not load AI or Camera."); 
                document.getElementById('boot-btn').innerText = "ERROR"; 
            }
        }

        // WAIT FOR VIDEO TO ACTUALLY PLAY BEFORE STARTING THE LOOP (CRITICAL FIX)
        video.addEventListener('play', () => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 800);
            
            document.getElementById('mode-display').innerText = "ENGINE: LIVE";
            printTerm("CAMERA: Feed established. Starting detection loop.");
            
            canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('cam-wrapper').append(canvas);
            ctx = canvas.getContext('2d');

            const loop = async () => {
                // FALLBACK: Use visible offsetWidth/Height so it never crashes on 0
                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                if (canvas.width !== displaySize.width) {
                    faceapi.matchDimensions(canvas, displaySize);
                }

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
                    .withFaceLandmarks().withFaceExpressions().withAgeAndGender();

                const scaled = faceapi.resizeResults(detections, displaySize);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (scaled.length === 0) {
                    if (Date.now() - lastSeenTime > 5000 && nextFaceId !== 1) {
                        nextFaceId = 1; printTerm("SYSTEM: Targets lost for 5s. ID reset.");
                    }
                } else {
                    lastSeenTime = Date.now();
                }

                let currentFrameFaces = [];
                scaled.forEach(item => {
                    const box = item.detection.box;
                    let match = trackedFaces.find(p => Math.sqrt(Math.pow(p.x - box.x, 2) + Math.pow(p.y - box.y, 2)) < 150);
                    let id = match ? match.id : nextFaceId++;
                    currentFrameFaces.push({ id, x: box.x, y: box.y });

                    // 1. ALWAYS DRAW THE SCANNER BOX
                    ctx.strokeStyle = '#5efcff';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);

                    // 2. DRAW 3D MESH ONLY IF BUTTON IS ACTIVE
                    if(meshEnabled) {
                        const drawOptions = new faceapi.draw.DrawFaceLandmarksOptions({ 
                            lineWidth: 2, drawLines: true, color: '#00ff66'
                        });
                        drawOptions.draw(canvas, item.landmarks);
                    }

                    // 3. DRAW MIRRORED TEXT
                    ctx.save();
                    ctx.scale(-1, 1);
                    ctx.fillStyle = '#5efcff';
                    ctx.font = 'bold 16px monospace';
                    ctx.fillText(`ID#00${id}`, -(box.x + box.width), box.y - 10);
                    ctx.restore();
                });

                trackedFaces = currentFrameFaces;
                document.getElementById('target-count').innerText = `TARGETS: ${scaled.length}`;
                
                if(scaled.length > 0) {
                    const p = scaled[0];
                    document.getElementById('out-gender').innerText = p.gender.toUpperCase();
                    document.getElementById('out-age').innerText = Math.round(p.age) + " YRS";
                    document.getElementById('out-emotion').innerText = Object.keys(p.expressions).reduce((a,b)=>p.expressions[a]>p.expressions[b]?a:b).toUpperCase();
                }
                
                requestAnimationFrame(loop);
            };
            loop();
        });
    </script>
</body>
</html>
