<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analytics Pro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #00e5ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
        }
        h1 { letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; font-size: 1.5rem; }
        .status-bar { margin-bottom: 20px; font-size: 0.9rem; color: #666; }
        .status-bar.active { color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        
        .video-container { 
            position: relative; 
            border: 3px solid #333; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            line-height: 0; 
        }
        canvas { position: absolute; top: 0; left: 0; }
        video { background: #000; object-fit: cover; }

        .data-panel {
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid #333;
            font-weight: bold;
            min-width: 300px;
            text-align: center;
        }
        #details { color: #fff; }
    </style>
</head>
<body>

    <h1>Biometric Scanner</h1>
    <div id="status" class="status-bar">INITIALIZING NEURAL NETS...</div>

    <div class="video-container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div class="data-panel">
        ANALYSIS: <span id="details">Waiting for face...</span>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const details = document.getElementById('details');

        // Load models from your /models folder
        async function loadModels() {
            const MODEL_URL = './models';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                startVideo();
            } catch (err) {
                status.innerText = "ERROR LOADING MODELS";
                console.error(err);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    status.innerText = "SYSTEM ONLINE";
                    status.classList.add('active');
                })
                .catch(err => {
                    status.innerText = "WEBCAM ACCESS DENIED";
                });
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-container').append(canvas);
            
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Clear the canvas for the next frame
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw detection boxes and emotions
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceExpressions(canvas, resizedDetections);

                if (resizedDetections.length > 0) {
                    resizedDetections.forEach(result => {
                        const { age, gender, expressions } = result;
                        
                        // Find the strongest emotion
                        const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                        
                        // Update Data Panel
                        details.innerText = `${Math.round(age)} Y/O | ${gender.toUpperCase()} | EMOTION: ${emotion.toUpperCase()}`;

                        // Draw Age/Gender text directly on video
                        new faceapi.draw.DrawTextField(
                            [`${Math.round(age)} years`, gender],
                            result.detection.box.topRight
                        ).draw(canvas);
                    });
                } else {
                    details.innerText = "Searching...";
                }
            }, 100);
        });

        loadModels();
    </script>
</body>
</html>
